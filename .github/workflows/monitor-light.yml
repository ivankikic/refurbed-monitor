name: refurbed monitor (light)

# Fast, polite scan of just the cheapest configs — runs often to catch steals
# that vanish in minutes. ~8 fetches/product, ~1 min/run.
on:
  schedule:
    - cron: "*/20 * * * *"     # every 20 minutes (UTC). Dial back if you like.
  workflow_dispatch: {}

permissions:
  contents: write

# Same group as the full workflow → they serialize, no seen.json races.
concurrency:
  group: refurbed-monitor
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt

      - name: Run monitor (light scan → AI rank → email new finds)
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_TO: ${{ secrets.ALERT_TO }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 monitor.py --mode light

      - name: Persist dedup state (seen.json)
        if: always()
        run: |
          if [[ -z "$(git status --porcelain seen.json)" ]]; then
            echo "seen.json unchanged"; exit 0
          fi
          git config user.name  "refurbed-monitor[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add seen.json
          git commit -m "state: update seen.json (light) [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break || sleep 4
          done
