name: refurbed MacBook monitor

# Free cloud cron — no laptop required.
# GitHub cron is in UTC. The times below ≈ 08:00 / 13:00 / 18:00 / 22:00 in
# Zagreb during summer (CEST, UTC+2). In winter (CET, UTC+1) they land one hour
# later local. Adjust the minutes/hours if you care about the exact local time.
on:
  schedule:
    - cron: "0 6,11,16,20 * * *"
  workflow_dispatch: {}        # lets you trigger a run by hand from the Actions tab

# Needed so the job can commit seen.json (dedup state) back to the repo.
permissions:
  contents: write

concurrency:
  group: refurbed-monitor      # never run two crawls at once
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run monitor (crawl → analyse → email new finds)
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_TO: ${{ secrets.ALERT_TO }}
          # optional — only if you use Telegram instead of / as well as email:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 monitor.py

      - name: Persist dedup state (commit seen.json if it changed)
        if: always()             # also save state even if a later step failed
        run: |
          if [[ -n "$(git status --porcelain seen.json)" ]]; then
            git config user.name  "refurbed-monitor[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add seen.json
            git commit -m "state: update seen.json [skip ci]"
            git push
          else
            echo "seen.json unchanged — nothing to commit"
          fi
