name: refurbed monitor

on:
  # ONE targeted scan drives everything. Scheduling is external via cron-job.org
  # (GitHub's own cron is throttled/unreliable) calling this workflow_dispatch
  # every 15 min. See DEPLOY.md.
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refurbed-monitor      # never run two scans at once / no seen.json races
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt

      - name: Run monitor (targeted crawl → baselines → AI rank → email new finds)
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_TO: ${{ secrets.ALERT_TO }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 monitor.py

      - name: Persist state (seen.json + baselines.json + history.jsonl)
        if: always()
        run: |
          git add seen.json baselines.json history.jsonl
          if git diff --cached --quiet; then echo "no state changes"; exit 0; fi
          git config user.name  "refurbed-monitor[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "state: seen + baselines + history [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break || sleep 4
          done
