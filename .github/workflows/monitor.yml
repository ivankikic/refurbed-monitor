name: refurbed monitor (full)

# Deep crawl — the complete matrix + anomalies — a few times a day.
# GitHub cron is UTC. 6/11/16/20 UTC ≈ 08/13/18/22 Zagreb (summer).
on:
  # Driven EXTERNALLY by cron-job.org (4×/day) via the workflow_dispatch REST
  # API — GitHub's own scheduled cron is unreliable. See DEPLOY.md.
  workflow_dispatch: {}

permissions:
  contents: write

# Shared across BOTH workflows so the full + light runs never overlap and never
# fight over seen.json.
concurrency:
  group: refurbed-monitor
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt

      - name: Run monitor (full crawl → AI rank → email new finds)
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_TO: ${{ secrets.ALERT_TO }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 monitor.py --mode full

      - name: Persist state (seen.json + baselines.json)
        if: always()
        run: |
          git add seen.json baselines.json
          if git diff --cached --quiet; then echo "no state changes"; exit 0; fi
          git config user.name  "refurbed-monitor[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "state: update seen.json + baselines.json (full) [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break || sleep 4
          done
